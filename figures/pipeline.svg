<svg viewBox="0 0 980 470" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',system-ui,sans-serif">
  <defs>
    <marker id="arw" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#6b6459"/>
    </marker>
    <marker id="arwR" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#b5533b"/>
    </marker>
    <style>
      .box{rx:10;ry:10;stroke-width:1.5}
      .t{fill:#1c1a17;font-size:14px;font-weight:600}
      .s{fill:#6b6459;font-size:11.5px}
      .lbl{fill:#6b6459;font-size:11px;font-style:italic}
      .h{fill:#1c1a17;font-size:13px;font-weight:700}
    </style>
  </defs>
  <rect x="0" y="0" width="980" height="470" fill="#faf7f2"/>

  <!-- source -->
  <rect class="box" x="24" y="188" width="150" height="88" fill="#ffffff" stroke="#c9c0b2"/>
  <text class="t" x="99" y="218" text-anchor="middle">Personal archive</text>
  <text class="s" x="99" y="240" text-anchor="middle">227 photos</text>
  <text class="lbl" x="99" y="260" text-anchor="middle">coherent on-spec set</text>

  <!-- visual branch (L1) -->
  <text class="h" x="330" y="60">VISUAL ROUTE · L1</text>
  <rect class="box" x="250" y="76" width="176" height="70" fill="#fbf1e8" stroke="#c08457"/>
  <text class="t" x="338" y="106" text-anchor="middle">SigLIP / CLIP</text>
  <text class="s" x="338" y="126" text-anchor="middle">image encoder</text>
  <rect class="box" x="470" y="76" width="176" height="70" fill="#ffffff" stroke="#c08457"/>
  <text class="t" x="558" y="106" text-anchor="middle">visual embeddings</text>
  <text class="s" x="558" y="126" text-anchor="middle">227 × 768</text>

  <!-- caption branch (L2) -->
  <text class="h" x="330" y="330">SEMANTIC ROUTE · L2</text>
  <rect class="box" x="250" y="304" width="176" height="80" fill="#eef3f5" stroke="#4a6b7c"/>
  <text class="t" x="338" y="332" text-anchor="middle">Gemma-3-4b-it</text>
  <text class="s" x="338" y="352" text-anchor="middle">structured-JSON caption</text>
  <text class="s" x="338" y="369" text-anchor="middle">deterministic decode</text>
  <rect class="box" x="470" y="304" width="176" height="80" fill="#eef3f5" stroke="#4a6b7c"/>
  <text class="t" x="558" y="332" text-anchor="middle">MiniLM-L6-v2</text>
  <text class="s" x="558" y="352" text-anchor="middle">caption text → vector</text>
  <text class="s" x="558" y="369" text-anchor="middle">227 × 384</text>

  <!-- fusion (L3) -->
  <text class="h" x="770" y="60" fill="#b5533b">HYBRID · L3</text>
  <rect class="box" x="700" y="188" width="256" height="94" fill="#ffffff" stroke="#b5533b" stroke-width="2"/>
  <text class="t" x="828" y="216" text-anchor="middle">Score-level fusion</text>
  <text class="s" x="828" y="238" text-anchor="middle">hybrid = α·visual + (1−α)·caption</text>
  <text class="s" x="828" y="257" text-anchor="middle">min-max normalised per corpus</text>
  <text class="lbl" x="828" y="275" text-anchor="middle" fill="#b5533b">best α = 0.3 · P@5 = 0.575</text>

  <!-- connectors -->
  <path d="M174,215 C214,215 226,111 248,111" fill="none" stroke="#6b6459" stroke-width="1.5" marker-end="url(#arw)"/>
  <path d="M174,248 C214,248 226,343 248,343" fill="none" stroke="#6b6459" stroke-width="1.5" marker-end="url(#arw)"/>
  <path d="M426,111 L466,111" fill="none" stroke="#6b6459" stroke-width="1.5" marker-end="url(#arw)"/>
  <path d="M426,344 L466,344" fill="none" stroke="#6b6459" stroke-width="1.5" marker-end="url(#arw)"/>
  <path d="M646,111 C690,111 700,205 700,214" fill="none" stroke="#b5533b" stroke-width="1.5" marker-end="url(#arwR)"/>
  <path d="M646,344 C690,344 700,258 700,250" fill="none" stroke="#b5533b" stroke-width="1.5" marker-end="url(#arwR)"/>

  <!-- eval note -->
  <text class="lbl" x="828" y="308" text-anchor="middle">evaluated on an 8-query gold set · precision@k</text>
</svg>
